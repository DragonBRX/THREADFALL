<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREADFALL - O Renascimento da Morte</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        h1 {
            color: #e74c3c;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>THREADFALL</h1>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div class="ui">
        <p>Status: Inicializando...</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Loop básico de renderização para teste
        function draw() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e74c3c';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Google Antigravity - Threadfall em Desenvolvimento', canvas.width / 2, canvas.height / 2);
            
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
